<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reference Board Builder_15</title>
  <script src="https://miro.com/app/static/sdk/v2/miro.js"></script>
  <script src="app.js" defer></script>
  <style>
    :root {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color-scheme: light;
    }
    html,
    body {
      min-height: 100%;
      height: auto;
      overflow-y: auto;
      overflow-x: hidden;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 0;
      font-size: 13px;
      color: #111827;
      background: #f9fafb;
      overflow-y: auto;
      overflow-x: hidden;
    }
    .app-shell {
      min-height: 100vh;
      height: auto;
      overflow: visible;
      padding: 10px 10px 60px;
      -webkit-overflow-scrolling: touch;
    }
    .app-header { margin-bottom: 8px; }
    .app-title {
      font-size: 17px;
      font-weight: 700;
      margin: 0;
      line-height: 1.2;
    }
    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 8px;
    }
    .tab-btn {
      flex: 1;
      padding: 6px 8px;
      font-size: 12px;
      border-radius: 999px;
      border: 1px solid rgba(15, 23, 42, 0.15);
      background: #e5e7eb;
      cursor: pointer;
      color: #000;
    }
    .tab-btn.active {
      background: #2563eb;
      color: #fff;
      border-color: #2563eb;
    }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .card {
      background: #ffffff;
      border: 1px solid rgba(15, 23, 42, 0.08);
      border-radius: 10px;
      padding: 10px;
      margin-bottom: 8px;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
    }
    .section-title {
      font-weight: 600;
      margin: 0 0 6px;
      font-size: 12px;
      color: #111827;
    }
    details.settings {
      border: 1px solid rgba(15, 23, 42, 0.08);
      border-radius: 8px;
      background: #f8fafc;
      padding: 8px;
    }
    details.settings > summary {
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      list-style: none;
      user-select: none;
    }
    details.settings > summary::-webkit-details-marker { display: none; }
    details.settings > summary::after {
      content: "▾";
      float: right;
      color: #64748b;
    }
    details.settings:not([open]) > summary::after {
      content: "▸";
    }
    .settings-body {
      margin-top: 8px;
    }
    .param-group { margin-bottom: 8px; }
    .param-group:last-of-type { margin-bottom: 0; }
    .param-group-title {
      margin: 0 0 4px;
      font-size: 11px;
      font-weight: 600;
      color: #475569;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 3px;
      margin-bottom: 8px;
    }
    .field-row-two,
    .field-row-three {
      flex-direction: row;
      gap: 6px;
      align-items: flex-end;
      flex-wrap: nowrap;
    }
    .field-row-two .subfield,
    .field-row-three .subfield {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    label {
      font-size: 11px;
      opacity: 0.92;
      line-height: 1.2;
    }
    input[type="number"],
    input[type="color"] {
      width: 100%;
      padding: 5px 6px;
      border-radius: 6px;
      border: 1px solid rgba(15, 23, 42, 0.16);
      font-size: 12px;
      background: #ffffff;
      color: #0f172a;
    }
    input[type="color"] {
      padding: 2px;
      height: 28px;
      cursor: pointer;
    }
    input[type="number"]:focus,
    input[type="color"]:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 1px rgba(37, 99, 235, 0.2);
    }
    input[type="checkbox"] {
      accent-color: #2563eb;
      width: 14px;
      height: 14px;
    }
    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
    }
    .button-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 6px;
      margin-top: 8px;
    }
    button.primary {
      width: 100%;
      padding: 8px 10px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 12px;
      cursor: pointer;
      border: none;
      background: #2563eb;
      color: #ffffff;
    }
    button:disabled { opacity: 0.6; cursor: default; }
    .file-picker {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .file-picker-button {
      padding: 5px 10px;
      border-radius: 999px;
      border: 1px solid #111827;
      background: #ffffff;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      color: #000;
    }
    .file-picker-label,
    .footer-note,
    .muted {
      font-size: 11px;
      color: #6b7280;
      line-height: 1.35;
    }
    #folderInput { display: none; }
    .status {
      display: none;
      border-radius: 8px;
      padding: 8px 10px;
      background: #eff6ff;
      color: #1d4ed8;
      font-size: 11px;
      margin-top: 8px;
      white-space: pre-line;
    }
    .status:not(:empty) { display: block; }
    .status.warning { background: #fff7ed; color: #c2410c; }
    .status.error { background: #fef2f2; color: #b91c1c; }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 6px;
      margin-top: 6px;
    }
    .stat-card {
      border: 1px solid rgba(15, 23, 42, 0.08);
      border-radius: 8px;
      background: #ffffff;
      padding: 8px;
    }
    .stat-label {
      font-size: 10px;
      color: #6b7280;
      margin-bottom: 3px;
    }
    .stat-value {
      font-size: 16px;
      font-weight: 700;
      color: #111827;
    }
    .result-box {
      width: 100%;
      min-height: 120px;
      max-height: 280px;
      padding: 8px;
      border: 1px solid rgba(15, 23, 42, 0.12);
      border-radius: 8px;
      background: #ffffff;
      overflow: auto;
    }
    .tree,
    .layout-tree {
      font-size: 11px;
      line-height: 1.45;
      color: #111827;
    }
    .tree details,
    .layout-tree details {
      border-left: 2px solid rgba(37, 99, 235, 0.12);
      margin-left: 4px;
      padding-left: 6px;
    }
    .tree summary,
    .layout-tree summary {
      cursor: pointer;
      font-weight: 600;
      margin: 3px 0;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 2px 6px;
      background: #e5e7eb;
      color: #111827;
      font-size: 10px;
      margin-left: 4px;
      vertical-align: middle;
    }
    .layout-note {
      font-size: 11px;
      color: #475569;
      margin-top: 6px;
      white-space: pre-line;
    }
    .navigation-box {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .nav-section {
      border: 1px solid rgba(15, 23, 42, 0.1);
      border-radius: 8px;
      background: #ffffff;
      overflow: hidden;
    }
    .nav-section > summary {
      cursor: pointer;
      user-select: none;
      padding: 8px;
      font-size: 12px;
      font-weight: 700;
      background: #f8fafc;
      list-style: none;
    }
    .nav-section > summary::-webkit-details-marker { display: none; }
    .nav-section > summary::after {
      content: "▾";
      float: right;
      color: #64748b;
    }
    .nav-section:not([open]) > summary::after { content: "▸"; }
    .nav-section-body {
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .nav-color-row,
    .nav-brightness-row {
      display: grid;
      grid-template-columns: 58px 1fr auto;
      align-items: center;
      gap: 8px;
      margin-bottom: 2px;
      font-size: 12px;
    }
    .nav-color-row {
      grid-template-columns: 58px 1fr;
    }
    .nav-color-input {
      width: 100%;
      min-height: 28px;
      padding: 0;
      border: 1px solid rgba(15, 23, 42, 0.16);
      border-radius: 7px;
      background: #ffffff;
    }
    .nav-brightness-input {
      width: 100%;
    }
    .nav-zoom-row,
    .nav-subtype-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }
    .nav-button {
      width: 100%;
      padding: 7px 8px;
      border-radius: 8px;
      border: 1px solid rgba(15, 23, 42, 0.16);
      background: #2563eb;
      color: #ffffff;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      text-align: left;
    }
    .nav-button-light {
      background: #ffffff;
      color: #111827;
    }
    .nav-subtype-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
  </style>
</head>
<body>
  <div class="app-shell">
  <div class="app-header">
    <h1 class="app-title">Reference Board Builder_15</h1>
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="builder">Builder</button>
    <button class="tab-btn" data-tab="stats">Статистика</button>
  </div>

  <div id="tab-builder" class="tab-content active">
    <div class="card">
      <div class="section-title">Папка</div>
      <div class="field">
        <div class="file-picker">
          <button type="button" id="folderButton" class="file-picker-button">Выбрать папку</button>
          <span id="folderLabel" class="file-picker-label">Папка не выбрана</span>
          <input id="folderInput" type="file" webkitdirectory directory multiple accept="image/*" />
        </div>
      </div>
      <div id="statusBox" class="status"></div>
    </div>

    <div class="card">
      <div class="section-title">Действие</div>
      <div class="button-row">
        <button type="button" id="buildButton" class="primary">Создать на доске</button>
      </div>
      <div class="footer-note">Параметры и статистика пересчитываются автоматически.</div>
    </div>

    <div class="card">
      <details class="settings">
        <summary>Параметры</summary>
        <div class="settings-body">
          <div class="param-group">
            <div class="param-group-title">Большой shape</div>
            <div class="field field-row-two">
              <div class="subfield">
                <label for="columnShapeWidth">Ширина</label>
                <input id="columnShapeWidth" type="number" step="1" value="6500" />
              </div>
              <div class="subfield">
                <label for="columnShapeHeight">Высота</label>
                <input id="columnShapeHeight" type="number" step="1" value="2600" />
              </div>
            </div>
          </div>

          <div class="param-group">
            <div class="param-group-title">Малый shape</div>
            <div class="field field-row-two">
              <div class="subfield">
                <label for="frameShapeWidth">Ширина</label>
                <input id="frameShapeWidth" type="number" step="1" value="2000" />
              </div>
              <div class="subfield">
                <label for="frameShapeHeight">Высота</label>
                <input id="frameShapeHeight" type="number" step="1" value="800" />
              </div>
            </div>
          </div>

          <div class="param-group">
            <div class="param-group-title">Текст</div>
            <div class="field field-row-three">
              <div class="subfield">
                <label for="textBoxWidth">Ширина</label>
                <input id="textBoxWidth" type="number" step="1" value="856" />
              </div>
              <div class="subfield">
                <label for="textBoxHeight">Высота</label>
                <input id="textBoxHeight" type="number" step="1" value="550" />
              </div>
              <div class="subfield">
                <label for="textFontSize">Шрифт</label>
                <input id="textFontSize" type="number" step="1" value="130" />
              </div>
            </div>
          </div>

          <div class="param-group">
            <div class="param-group-title">Фрейм</div>
            <div class="field field-row-three">
              <div class="subfield">
                <label for="frameWidth">Ширина</label>
                <input id="frameWidth" type="number" step="1" value="12000" />
              </div>
              <div class="subfield">
                <label for="imageGap">Отступ картинок</label>
                <input id="imageGap" type="number" step="1" value="25" />
              </div>
              <div class="subfield">
                <label for="groupGap">Отступ групп</label>
                <input id="groupGap" type="number" step="1" value="300" />
              </div>
            </div>
          </div>

          <div class="param-group">
            <div class="param-group-title">Отступы</div>
            <div class="field field-row-three">
              <div class="subfield">
                <label for="innerPadding">Внутренний</label>
                <input id="innerPadding" type="number" step="1" value="120" />
              </div>
              <div class="subfield">
                <label for="columnGap">Между колонками</label>
                <input id="columnGap" type="number" step="1" value="180000" />
              </div>
              <div class="subfield">
                <label for="headerToFramesGap">До фреймов</label>
                <input id="headerToFramesGap" type="number" step="1" value="4000" />
              </div>
            </div>
          </div>

          <div class="param-group">
            <div class="param-group-title">Оглавление</div>
            <div class="field field-row-two">
              <div class="subfield">
                <label for="outlineOffsetX">Влево от первого shape</label>
                <input id="outlineOffsetX" type="number" step="1" value="150000" />
              </div>
              <div class="subfield">
                <label for="outlineOffsetY">Вверх от первого shape</label>
                <input id="outlineOffsetY" type="number" step="1" value="45000" />
              </div>
            </div>
            <div class="field field-row-two">
              <div class="subfield">
                <label for="outlineCategoryWidth">Большой: ширина</label>
                <input id="outlineCategoryWidth" type="number" step="1" value="6000" />
              </div>
              <div class="subfield">
                <label for="outlineCategoryHeight">Большой: высота</label>
                <input id="outlineCategoryHeight" type="number" step="1" value="2500" />
              </div>
            </div>
            <div class="field field-row-two">
              <div class="subfield">
                <label for="outlineSubtypeWidth">Подтип: ширина</label>
                <input id="outlineSubtypeWidth" type="number" step="1" value="3500" />
              </div>
              <div class="subfield">
                <label for="outlineSubtypeHeight">Подтип: высота</label>
                <input id="outlineSubtypeHeight" type="number" step="1" value="1500" />
              </div>
            </div>
            <div class="field field-row-three">
              <div class="subfield">
                <label for="outlineSubtypeGapX">Отступ вправо</label>
                <input id="outlineSubtypeGapX" type="number" step="1" value="600" />
              </div>
              <div class="subfield">
                <label for="outlineSubtypeGapY">Шаг подтипов</label>
                <input id="outlineSubtypeGapY" type="number" step="1" value="350" />
              </div>
              <div class="subfield">
                <label for="outlineSectionGapY">Шаг разделов вправо</label>
                <input id="outlineSectionGapY" type="number" step="1" value="1500" />
              </div>
            </div>
          </div>

          <div class="field">
            <label class="checkbox-row">
              <input id="sortByColor" type="checkbox" checked />
              Сортировать по цвету
            </label>
          </div>
        </div>
      </details>
    </div>

    <div class="card">
      <div class="section-title">Навигация</div>
      <div id="navigationResult" class="navigation-box">
        <div class="muted">Навигация появится после создания доски.</div>
      </div>
    </div>
  </div>

  <div id="tab-stats" class="tab-content">
    <div class="card">
      <div class="section-title">Сводка</div>
      <div id="statsGrid" class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">Категории</div>
          <div class="stat-value" id="statCategories">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Фреймы</div>
          <div class="stat-value" id="statFrames">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Группы</div>
          <div class="stat-value" id="statGroups">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Картинки</div>
          <div class="stat-value" id="statImages">0</div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="section-title">Структура</div>
      <div id="structureResult" class="result-box tree"></div>
    </div>

    <div class="card">
      <div class="section-title">Раскладка</div>
      <div id="layoutResult" class="result-box layout-tree"></div>
      <div id="layoutNote" class="layout-note"></div>
    </div>
  </div>
  </div>
</body>
</html>
